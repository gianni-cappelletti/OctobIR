name: Release JUCE Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.0 or 2.0.0-beta.1)'
        required: true
        default: '2.0.0'

jobs:
  resolve-version:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
            if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
              echo "::warning::Tag version ($TAG_VERSION) differs from VERSION file ($FILE_VERSION). Using tag."
            fi
            VERSION="$TAG_VERSION"
          else
            VERSION="$(cat VERSION | tr -d '[:space:]')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '-(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $VERSION"

  build-macos-plugins:
    name: Build JUCE Plugins - macOS (universal)
    runs-on: macos-14
    needs: [resolve-version]
    strategy:
      matrix:
        plugin:
          - name: octobir
            cmake_target: OctobIR_All
            product_name: OctobIR
          - name: octobass
            cmake_target: OctoBASS_All
            product_name: OctoBASS
    env:
      BUILD_DIR: build/release-macos-universal
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: brew install cmake ninja

    - name: Build plugin (universal arm64 + x86_64)
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        TARGET="${{ matrix.plugin.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release-macos-universal \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G Ninja
        cmake --build "$BUILD_DIR" --target "$TARGET" --config Release -j

    - name: Verify universal binary
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        PRODUCT="${{ matrix.plugin.product_name }}"
        ARTEFACTS="$BUILD_DIR/plugins/$PLUGIN/juce/${PRODUCT}_artefacts/Release"

        echo "Checking VST3..."
        lipo -info "$ARTEFACTS/VST3/$PRODUCT.vst3/Contents/MacOS/$PRODUCT"
        file "$ARTEFACTS/VST3/$PRODUCT.vst3/Contents/MacOS/$PRODUCT" | grep -q "universal" \
          || (echo "ERROR: VST3 is not a universal binary" && exit 1)

        echo "Checking AU..."
        lipo -info "$ARTEFACTS/AU/$PRODUCT.component/Contents/MacOS/$PRODUCT"
        file "$ARTEFACTS/AU/$PRODUCT.component/Contents/MacOS/$PRODUCT" | grep -q "universal" \
          || (echo "ERROR: AU is not a universal binary" && exit 1)

        echo "Universal binary verification passed"

    - name: Upload build artefacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.plugin.name }}-macos-build
        path: ${{ env.BUILD_DIR }}/plugins/${{ matrix.plugin.name }}/juce/${{ matrix.plugin.product_name }}_artefacts/Release/

  package-macos-installer:
    name: Package macOS Installer (OctoberPluginsSuite)
    runs-on: macos-14
    needs: [resolve-version, build-macos-plugins]
    env:
      BUILD_DIR: build/release-macos-universal
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OctoBASS build
      uses: actions/download-artifact@v4
      with:
        name: octobass-macos-build
        path: ${{ env.BUILD_DIR }}/plugins/octobass/juce/OctoBASS_artefacts/Release

    - name: Download OctobIR build
      uses: actions/download-artifact@v4
      with:
        name: octobir-macos-build
        path: ${{ env.BUILD_DIR }}/plugins/octobir/juce/OctobIR_artefacts/Release

    - name: Build unified installer
      env:
        SIGNING_IDENTITY: "-"
      run: |
        chmod +x installers/macos/build-pkg.sh
        ./installers/macos/build-pkg.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OctoberPluginsSuite-macos-installer
        path: dist/OctoberPluginsSuite-*-macOS.dmg

  build-windows-plugins:
    name: Build JUCE Plugins - Windows
    runs-on: windows-latest
    needs: [resolve-version]
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    strategy:
      matrix:
        plugin:
          - name: octobir
            cmake_target: OctobIR_All
            product_name: OctobIR
          - name: octobass
            cmake_target: OctoBASS_All
            product_name: OctoBASS

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install CMake
      uses: lukka/get-cmake@latest

    # --target "$TARGET" is required: without it cmake builds ALL_BUILD,
    # which pulls in the other plugin's vcv-rack target. VCV Rack is not
    # supported on Windows, so vcv-plugin.vcxproj fails with MSB1003.
    # Linux already does the same thing.
    - name: Build plugin
      shell: bash
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        TARGET="${{ matrix.plugin.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G "Visual Studio 17 2022" -A x64
        cmake --build build/release --target "$TARGET" --config Release -j

    - name: Upload build artefacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.plugin.name }}-windows-build
        path: build/release/plugins/${{ matrix.plugin.name }}/juce/${{ matrix.plugin.product_name }}_artefacts/Release/

  package-windows-installer:
    name: Package Windows Installer (OctoberPluginsSuite)
    runs-on: windows-latest
    needs: [resolve-version, build-windows-plugins]
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OctoBASS build
      uses: actions/download-artifact@v4
      with:
        name: octobass-windows-build
        path: build/release/plugins/octobass/juce/OctoBASS_artefacts/Release

    - name: Download OctobIR build
      uses: actions/download-artifact@v4
      with:
        name: octobir-windows-build
        path: build/release/plugins/octobir/juce/OctobIR_artefacts/Release

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Create dist directory
      shell: pwsh
      run: New-Item -ItemType Directory -Force -Path dist | Out-Null

    # Use pwsh (not bash) so MSYS does not mangle the leading-slash /D argument
    # passed to native iscc.exe. See plan file for full rationale.
    - name: Build unified installer
      shell: pwsh
      run: |
        iscc "/DAppVersion=$env:RELEASE_VERSION" installers/windows/OctoberPluginsSuite.iss

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OctoberPluginsSuite-windows-installer
        path: dist/OctoberPluginsSuite-*-Windows.exe

  build-linux-plugins:
    name: Build JUCE Plugins - Linux (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    needs: [resolve-version]
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    strategy:
      matrix:
        plugin:
          - name: octobir
            cmake_target: OctobIR_All
            product_name: OctobIR
          - name: octobass
            cmake_target: OctoBASS_All
            product_name: OctoBASS
        arch:
          - name: x86_64
            runner: ubuntu-latest
            vst3_subdir: x86_64-linux
          - name: aarch64
            runner: ubuntu-24.04-arm
            vst3_subdir: aarch64-linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libasound2-dev \
          libjack-jackd2-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libx11-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxext-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          mesa-common-dev

    - name: Build plugin
      run: |
        PLUGIN="${{ matrix.plugin.name }}"
        TARGET="${{ matrix.plugin.cmake_target }}"
        UPPER_PLUGIN=$(echo "$PLUGIN" | tr '[:lower:]' '[:upper:]')
        cmake --preset release \
          -DBUILD_${UPPER_PLUGIN}_JUCE=ON \
          -DBUILD_${UPPER_PLUGIN}_VCV=OFF \
          -G Ninja
        cmake --build build/release --target "$TARGET" --config Release -j

    - name: Upload build artefacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.plugin.name }}-linux-${{ matrix.arch.name }}-build
        path: build/release/plugins/${{ matrix.plugin.name }}/juce/${{ matrix.plugin.product_name }}_artefacts/Release/

  package-linux-installer:
    name: Package Linux Tarball (OctoberPluginsSuite)
    runs-on: ubuntu-latest
    needs: [resolve-version, build-linux-plugins]
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OctoBASS x86_64 build
      uses: actions/download-artifact@v4
      with:
        name: octobass-linux-x86_64-build
        path: artefacts/octobass/x86_64

    - name: Download OctoBASS aarch64 build
      uses: actions/download-artifact@v4
      with:
        name: octobass-linux-aarch64-build
        path: artefacts/octobass/aarch64

    - name: Download OctobIR x86_64 build
      uses: actions/download-artifact@v4
      with:
        name: octobir-linux-x86_64-build
        path: artefacts/octobir/x86_64

    - name: Download OctobIR aarch64 build
      uses: actions/download-artifact@v4
      with:
        name: octobir-linux-aarch64-build
        path: artefacts/octobir/aarch64

    - name: Assemble multi-arch tarball
      run: |
        STAGE="package/OctoberPluginsSuite"
        mkdir -p "$STAGE"

        # Merge per-arch VST3 bundles into a single multi-arch bundle.
        # The VST3 spec supports multiple arch subfolders inside Contents/,
        # and the host loader picks the matching one at load time.
        merge_bundle() {
          local product="$1"          # OctoBASS / OctobIR
          local x64_bundle="artefacts/${product,,}/x86_64/VST3/${product}.vst3"
          local arm_bundle="artefacts/${product,,}/aarch64/VST3/${product}.vst3"
          local out_bundle="$STAGE/${product}.vst3"

          if [ ! -d "$x64_bundle" ] && [ ! -d "$arm_bundle" ]; then
            echo "Warning: ${product}.vst3 missing for both architectures, skipping"
            return
          fi

          if [ -d "$x64_bundle" ]; then
            cp -r "$x64_bundle" "$out_bundle"
          else
            echo "Warning: ${product} x86_64 build missing"
            cp -r "$arm_bundle" "$out_bundle"
            return
          fi

          if [ -d "$arm_bundle/Contents/aarch64-linux" ]; then
            cp -r "$arm_bundle/Contents/aarch64-linux" "$out_bundle/Contents/"
          else
            echo "Warning: ${product} aarch64 binary missing from build"
          fi
        }

        merge_bundle OctoBASS
        merge_bundle OctobIR

        echo "Final bundle contents:"
        find "$STAGE" -maxdepth 4 -type d

        cp LICENSE README.md "$STAGE/"
        cp installers/linux/install.sh "$STAGE/"
        chmod +x "$STAGE/install.sh"

        mkdir -p dist
        tar -czf "dist/OctoberPluginsSuite-${RELEASE_VERSION}-Linux.tar.gz" -C package OctoberPluginsSuite

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OctoberPluginsSuite-linux
        path: dist/OctoberPluginsSuite-*-Linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [resolve-version, package-macos-installer, package-windows-installer, package-linux-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.dmg
          artifacts/**/*.exe
          artifacts/**/*.tar.gz
        draft: true
        prerelease: ${{ needs.resolve-version.outputs.is_prerelease == 'true' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
